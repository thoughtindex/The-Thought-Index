  <style>
    * { box-sizing: border-box; }

    /* Slideshow container */
    .slideshow-container {
      max-width: 600px; /* Adjusted so images look balanced */
      position: relative;
      margin: auto;
    }

    /* Hide the images by default */
    .mySlides {
      display: none; /* CHANGED FROM inherit TO none */
      width: 100%;
    }

    /* Make images fill the slide container properly */
    .mySlides img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    /* Next & previous buttons */
    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: auto;
      padding: 16px;
      color: white;
      font-weight: bold;
      font-size: 18px;
      transition: 0.6s ease;
      border-radius: 0 3px 3px 0;
      user-select: none;
      background-color: rgba(0,0,0,0.3);
    }

    /* Position the "next button" to the right */
    .next {
      right: 0;
      border-radius: 3px 0 0 3px;
    }

    /* On hover, add a darker background */
    .prev:hover, .next:hover {
      background-color: rgba(0,0,0,0.8);
    }

    /* Caption text */
    .text {
      color: #f2f2f2;
      font-size: 18px;
      font-weight: bold;
      padding: 8px 12px;
      position: absolute;
      bottom: 15px;
      width: 100%;
      text-align: center;
      background-color: rgba(0, 0, 0, 0.6);
    }

    /* Number text (1/3 etc) */
    .numbertext {
      color: #f2f2f2;
      font-size: 12px;
      padding: 8px 12px;
      position: absolute;
      top: 0;
      background-color: rgba(0, 0, 0, 0.4);
    }

    /* The dots/bullets/indicators */
    .dot {
      cursor: pointer;
      height: 15px;
      width: 15px;
      margin: 0 2px;
      background-color: #bbb;
      border-radius: 50%;
      display: inline-block;
      transition: background-color 0.6s ease;
    }

    .active, .dot:hover {
      background-color: #717171;
    }

    /* Fading animation */
    .fade {
      animation-name: fade;
      animation-duration: 1.5s;
    }

    @keyframes fade {
      from { opacity: .4; }
      to { opacity: 1; }
    }
  </style>
  <div style="visibility:hidden; display:none;">

</head>

      `)
      const BaseSlideshow = document.getElementsByClassName("slideshow-container")[0]
      const BaseContainer = document.getElementById("BaseContainer")
      Object.entries(data).forEach((entry) => {
          const [Category, Specifics] = entry;
          Object.entries(Specifics).forEach((second) => {
              const [Specific, Data] = second;
              console.log(`${Specific}, ${Data.Ingredients}, ${Data.Price}, ${Data.Image}`)
              let SpecificNode = BaseContainer.cloneNode(true)
              SpecificNode.classList.add("mySlides")
              SpecificNode.querySelector(".text").textContent = `${Specific}`
              if(Data.Image) { 
                SpecificNode.querySelector("img").src = Data.Image
                BaseSlideshow.appendChild(SpecificNode)
              }

      });

      let i;
      let slides = document.getElementsByClassName("mySlides");
      let dots = document.getElementsByClassName("dot");
      
      if (n > slides.length) { slideIndex = 1 }
      if (n < 1) { slideIndex = slides.length }
      
      // Hide all slides
      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      
      // Remove active class from all dots
      for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
      }
      
      // Show the current slide and activate the corresponding dot
      slides[slideIndex - 1].style.display = "block";
      dots[slideIndex - 1].className += " active";
    }
  </script>
